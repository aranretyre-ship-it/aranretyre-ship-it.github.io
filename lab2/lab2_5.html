<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Форма регистрации</title>
    <style>
        label { display: inline-block; width: 120px; vertical-align: top; margin-bottom: 10px; }
        .row { margin-bottom: 10px; }
    </style>
</head>
<body>

    <h2>Форма регистрации пользователя</h2>

    <form action="#" method="post">
        <!-- Поле E-mail (обязательное + проверка формата) -->
        <div class="row">
            <label for="email">E-mail</label>
            <input type="email" id="email" name="email" placeholder="Введите e-mail" required>
        </div>

        <!-- Пароль (обязательное) -->
        <div class="row">
            <label for="password">Пароль</label>
            <input type="password" id="password" name="password" placeholder="Введите пароль" required>
        </div>

        <!-- Пол (радиокнопки с кликабельными подписями) -->
        <div class="row">
            <label>Пол</label>
            <input type="radio" id="male" name="gender" value="m">
            <label for="male" style="width: auto;">Мужчина</label>
            
            <input type="radio" id="female" name="gender" value="f">
            <label for="female" style="width: auto;">Женщина</label>
        </div>

        <!-- Год рождения (выпадающий список) -->
        <div class="row">
            <label for="year">Год рождения</label>
            <select id="year" name="year">
                <option value="1981">1981</option>
                <option value="1982">1982</option>
                <!-- и так далее -->
            </select>
        </div>

        <!-- Знание языков (чекбоксы) -->
        <div class="row">
            <label>Я знаю</label>
            <div style="display: inline-block;">
                <input type="checkbox" id="ru" name="lang" value="ru" checked disabled>
                <label for="ru" style="width: auto;">Русский</label><br>
                
                <input type="checkbox" id="es" name="lang" value="es">
                <label for="es" style="width: auto;">Испанский</label><br>
                
                <input type="checkbox" id="de" name="lang" value="de">
                <label for="de" style="width: auto;">Немецкий</label>
            </div>
        </div>

        <!-- О себе (текстовая область) -->
        <div class="row">
            <label for="about">Обо мне</label>
            <textarea id="about" name="about" rows="5" cols="30" placeholder="Напишите коротко о себе"></textarea>
        </div>

        <!-- Кнопки -->
        <div class="row" style="margin-left: 125px;">
            <button type="submit">Готово</button>
            <button type="reset">Очистить</button>
        </div>
    </form>

</body>
</html>
