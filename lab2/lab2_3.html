<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Задание с фреймами</title>
    <style>
        body { margin: 0; padding: 0; display: flex; height: 100vh; overflow: hidden; }
        /* Левая узкая колонка для меню */
        #menu-frame { width: 250px; border-right: 2px solid #ccc; height: 100%; }
        /* Правая широкая область для контента */
        #content-frame { flex-grow: 1; border: none; height: 100%; }
    </style>
</head>
<body>

    <!-- src указывает на файл с кнопками. name="left" — имя для ссылок -->
    <iframe src="iframes/menu.html" id="menu-frame" name="left"></iframe>

    <!-- Здесь по умолчанию открыт doc.html. name="right" — СЮДА будут грузиться страницы -->
    <iframe src="iframes/doc.html" id="content-frame" name="right"></iframe>

</body>
</html>
