<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Лабораторная работа №2 - Таблицы</title>
<style>
    table {
        width: 200px;
        border: 1px solid gray;
        margin: 20px;
        float: left; 
        border-collapse: collapse;
    }
    td, th {
        border: 1px solid gray;
        padding: 20px;
        text-align: center;
    }
</style>
</head>
<body>
    <table>
        <caption>1-я таблица</caption>
        <tr>
            <th rowspan="2">1</th>
            <td colspan="2">2</td> 
        </tr>
        <tr>
            <td>5</td>
            <td>6</td>
        </tr>
    </table>

    <!-- 2-я таблица -->
    <table>
        <caption>2-я таблица</caption>
        <tr>
            <th colspan="2">1</th> 
        </tr>
        <tr>
            <td rowspan="2">3</td>
            <td>4</td>
        </tr>
        <tr>
            <td>6</td>
        </tr>
    </table>

    <table>
        <caption>3-я таблица</caption>
        <tr>
            <td>1</td>
            <td rowspan="3">2</td> 
        </tr>
        <tr>
            <td>3</td>
        </tr>
        <tr>
            <td>5</td>
        </tr>
    </table>

    <table>
        <caption>4-я таблица</caption>
        <tr>
            <th colspan="2">1</th> 
        </tr>
        <tr>
            <td rowspan="2">3</td>
            <td>4</td>
        </tr>
        <tr>
            <td>5</td>
        </tr>
    </table>

</body>
</html>
