<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Оформление вертикального меню</title>
    <style>
        html {
            background: #f0f0f0;
            font-family: Arial, sans-serif;
        }
        
        .menu {
            width: 250px;
            background: #fff;
            padding: 15px;
            border: 1px solid #ccc;
            margin: 20px;
        }
        .menu ul {
            list-style: none; 
            padding: 0;
            margin: 0;
        }
        
        .menu > ul > li {
            list-style-image: url('plus.gif'); 
            margin-left: 20px;
            margin-bottom: 15px;
        }
        
        .menu li a {
            text-decoration: none;
            color: #0055aa;
            font-size: 14px;
            vertical-align: middle;
        }
        
        .menu li a:hover {
            text-decoration: underline;
            color: #ff6600;
        }
        
        .menu li ul {
            margin-top: 5px;
            margin-left: 20px; 
        }
        
        .menu li ul li {
            list-style-image: url('bullet.gif'); 
            margin-bottom: 5px;
        }

        .menu li {
            padding-left: 5px;
        }
    </style>
</head>
<body>
    <nav class="menu">
        <ul>
            <li><a href="#">Фильмы</a>
                <ul>
                    <li><a href="#">Экшн</a></li>
                    <li><a href="#">Мелодрамы</a></li>
                    <li><a href="#">Сериалы</a></li>
                    <li><a href="#">Семейные</a></li>
                </ul>
            </li>
            <li><a href="#">Музыка</a>
                <ul>
                    <li><a href="#">Классика</a></li>
                    <li><a href="#">Джаз</a></li>
                    <li><a href="#">Рок</a></li>
                    <li><a href="#">Грандж</a></li>
                </ul>
            </li>
            <li><a href="#">Софт</a>
                <ul>
                    <li><a href="#">Графика</a></li>
                    <li><a href="#">3D-моделирование</a></li>
                    <li><a href="#">Машинопись</a></li>
                    <li><a href="#">Переводчики</a></li>
                </ul>
            </li>
            <li><a href="#">Игры</a>
                <ul>
                    <li><a href="#">РПГ</a></li>
                    <li><a href="#">Шутеры</a></li>
                    <li><a href="#">Пасьянсы</a></li>
                </ul>
            </li>
        </ul>
    </nav>
</body>
</html>
